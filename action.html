<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speed Tracker</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 12px;
      min-height: 100vh;
    }

    h2 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }

    /* ── Section card ───────────────────────────────────────────────── */
    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    /* ── Grid setting row ───────────────────────────────────────────── */
    .row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    label {
      flex: 1;
      color: #bbb;
    }

    input[type="number"] {
      width: 60px;
      padding: 4px 6px;
      background: #0f3460;
      border: 1px solid #533483;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 13px;
      text-align: center;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #e94560;
    }

    /* ── Buttons ────────────────────────────────────────────────────── */
    button {
      padding: 5px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    #fps-btn {
      background: #533483;
      color: #fff;
    }

    #reset-btn {
      width: 100%;
      padding: 7px;
      background: #e94560;
      color: #fff;
      font-size: 13px;
      margin-top: 2px;
    }

    /* ── Token list ─────────────────────────────────────────────────── */
    #token-list {
      list-style: none;
      max-height: 120px;
      overflow-y: auto;
      margin-top: 6px;
    }

    #token-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      border-bottom: 1px solid #0f3460;
    }

    #token-list li:last-child { border-bottom: none; }

    .token-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 140px;
    }

    .token-speed {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* ── Status line ────────────────────────────────────────────────── */
    #status {
      font-size: 11px;
      min-height: 14px;
      margin-top: 4px;
    }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #533483; border-radius: 2px; }
  </style>
</head>
<body>

  <!-- ── Grid configuration ──────────────────────────────────────── -->
  <div class="card">
    <h2>Grid Scale</h2>
    <div class="row">
      <label for="fps-input">Feet per square</label>
      <input id="fps-input" type="number" value="5" min="1" max="100" />
      <button id="fps-btn">Save</button>
    </div>
    <p id="status"></p>
  </div>

  <!-- ── Round reset ─────────────────────────────────────────────── -->
  <div class="card">
    <h2>New Round</h2>
    <button id="reset-btn">⟳ Reset All Movement</button>
  </div>

  <!-- ── Token speed summary ─────────────────────────────────────── -->
  <div class="card">
    <h2>Tokens</h2>
    <ul id="token-list">
      <li style="color:#666;font-style:italic">Loading…</li>
    </ul>
  </div>

  <script type="module" src="/src/action.ts"></script>
</body>
</html>
